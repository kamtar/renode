name: Build Windows net8.0 artifact

on:
  workflow_dispatch:

jobs:
  build-windows-net8:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build Windows net8.0 binaries
        shell: bash
        run: |
          ./build.sh --no-gui

      - name: Upload Windows net8.0 binaries
        uses: actions/upload-artifact@v4
        with:
          name: renode-windows-net8.0-win-x64
          path: output/bin/Release/win-x64/publish
          if-no-files-found: error
