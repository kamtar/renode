name: Build Windows net8.0 artifact

on:
  workflow_dispatch:

jobs:
  build-windows-net8:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          run: python -m pip install -r tests/requirements.txt

      - name: Build Windows net8.0 binaries
        shell: bash
        run: ./build.sh -t

      - name: Upload Windows net8.0 binaries
        uses: actions/upload-artifact@v4
        with:
          name: renode-windows-net8.0-win-x64
          path: output
          if-no-files-found: error
